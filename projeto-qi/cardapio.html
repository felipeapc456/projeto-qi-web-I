<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baita Açaiteria - Cardápio</title>

  <link rel="stylesheet" href="cardapio.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <nav class="navbar">

    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <div class="logo">
      <a href="inicio.html">
        <img src="img/logo-removebg-preview.png" alt="Baita Açaiteria">
      </a>
    </div>

    <ul class="nav-links" id="menu">
      <li><a href="quemsomos.html">Quem somos</a></li>
      <li><a href="cardapio.html">Cardápio</a></li>
      <li><a href="#">Contato</a></li>
    </ul>

    <div class="social-icons">
      <a href="https://www.instagram.com/baita_acaiteria/" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://wa.me/5551989724829" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>

  </nav>

  <div class="menu-title">
    <h1>Cardápio</h1>
  </div>
</header>

<main class="container">
  <section class="card-grid">

    <div class="card">
      <img src="img/14002e26-5452-4376-9e80-5aa05e0ed316.jpg" alt="Açaí Médio">
      <div class="card-content">
        <h3>Açaí médio (330 ml)</h3>
        <p>Açaí 330 ml - Inclui até 3 complementos grátis.</p>
        <span class="price">R$ 25,00</span>
      </div>
    </div>

    <div class="card">
      <img src="img/bbf6f4c6-9510-4471-943b-8fd6cc960ae5.jpg" alt="Açaí Grande">
      <div class="card-content">
        <h3>Açaí Grande (550 ml)</h3>
        <p>Açaí 550 ml - Inclui até 3 complementos grátis.</p>
        <span class="price">R$ 33,99</span>
      </div>
    </div>

    <div class="card">
      <img src="img/a445cf9c-a985-459c-bd20-ec68bb0c9f94.jpg" alt="Açaí Batido">
      <div class="card-content">
        <h3>Açaí Batido</h3>
        <p>Açaí 300 ml na garrafinha.</p>
        <span class="price">R$ 20,00</span>
      </div>
    </div>

  </section>
</main>

<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {
  menu.classList.toggle("active");
});
</script>

</body>
</html>
